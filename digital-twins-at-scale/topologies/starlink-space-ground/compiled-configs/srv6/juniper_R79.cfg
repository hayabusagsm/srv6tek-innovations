        instance-type vrf;
        interface lo0.1;
        route-distinguisher 701:1;
        vrf-target target:1:1;
        routing-options {
            protect core;
            
            rib vrf_red.inet6.0 { protect core; }
            
        }
        protocols {
            bgp {
                
